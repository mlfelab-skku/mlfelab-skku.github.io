          title_kr: 다 같이, 학회 입성 📸
          images:
            - korms-2026-1.jpg
        - title: First-day lunch 🍚
          title_kr: 첫날 점심부터 든든하게 🍚
          style: small
          images:
            - korms-2026-2.jpg
        - title: Luge with Prof. Huh 🛷
          title_kr: 교수님과 루지 한 판 🛷
          note: Thanks, Professor! 🙏
          note_kr: 감사합니다 교수님! 🙏
