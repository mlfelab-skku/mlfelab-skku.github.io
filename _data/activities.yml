# Activities shown on the "news & activities" page (newest first by `date`).
#
# Photos: place files under assets/img/activities/ using the `file` names below.
# Galleries render only when `photos_ready: true` (jekyll-polyglot does not expose
# site.static_files reliably on ko pages, so we gate on this flag, not the filesystem).
# An activity can be a simple card OR a rich photo-essay with `sections` -> `blocks`
# (each block = a sub-title + a photo gallery, with optional per-photo captions, a note,
# and a style hint: grid (default) | small | portrait).
# image entry: a plain filename, or { file:, caption:, caption_kr: }.
# category: conference | seminar | social | celebration

- id: korms-2026
  date: 2026-06-05
  date_label: "Jun 4–5, 2026"
  category: conference
  location: Gyeongju
  title: 2026 KORMS Spring Joint Conference
  title_kr: 2026 한국경영과학회 춘계공동학술대회
  hero: korms-2026-1.jpg
  photos_ready: true # flip to false to hide the galleries
  summary: >-
    The lab headed to Gyeongju for the 2026 Spring Joint Conference of the Korean Operations
    Research and Management Science Society (KORMS) — 2 talks (Seungho Na, Hojin Ko) and
    5 posters (Minji Lee, Dongwan Shin, Myeongsik Kim, Yoonyoung Byun, Youngwoo Lee),
    plus a luge run and a good amount of Gyeongju along the way.
  summary_kr: >-
    연구실이 경주에서 열린 2026 한국경영과학회(KORMS) 춘계공동학술대회에 다녀왔습니다 —
    구두 2건(나승호·고호진)과 포스터 5건(이민지·신동완·김명식·변윤영·이영우)을 발표하고,
    루지도 타고 경주 구경도 하며 알찬 이틀을 보냈습니다.
  sections:
    - heading: "Day 1 · June 4"
      heading_kr: "1일차 · 6월 4일"
      blocks:
