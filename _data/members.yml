# Lab members. Shared across languages; the People page localizes group headings.
# group: postdoc | grad | undergrad | alumni
# slug:  used for the per-member profile page at /people/<slug>/
# image: path under assets/img/ (shown only if the member has the field + file exists)
# bio:   1-3 sentence research description for the profile page (longer than `detail`)
# pubs:  publications, newest first. status: published | working. url optional.
members:
  # --- Postdoctoral researcher ---
  - group: postdoc
    slug: seungwon-jeong
    name: Seungwon Jeong
    name_kr: 정승원
    role: Postdoctoral Researcher
    image: team/seungwon-jeong.jpg
    detail: Financial time-series data augmentation, dynamic portfolio allocation, policy iteration
    scholar: "https://scholar.google.com/citations?user=yPY4vyMAAAAJ&hl=ko"
    bio: >-
      Seungwon Jeong works on financial time-series data augmentation, dynamic portfolio
      allocation, and policy iteration. His work spans learning stochastic dynamics for
      accelerated SDE simulation, distribution learning for continuous-time financial models,
      equity premium forecasting, and Pontryagin-guided direct policy optimization.
    pubs:
      - { authors_short: "S.-H. Lee, Huh & Jeong", title: "DeepONet-Based Surrogate Modeling for Bond Option Pricing", venue: "AIMS Mathematics", year: 2026, status: published, url: "https://www.aimspress.com/article/doi/10.3934/math.2026242" }
      - { authors_short: "Huh, Jeon & Jeong", title: "Equity Premium Forecasting with Reliability-Screened Forward-Looking Signals", venue: "PLoS ONE", year: 2026, status: published, url: "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0341578" }
      - { authors_short: "Huh & Jeong", title: "Learning Distributions for Continuous-Time Financial Models", venue: "Computational Economics", year: 2026, status: published, url: "https://link.springer.com/article/10.1007/s10614-025-11044-6" }
      - { authors_short: "Huh & Jeong", title: "Breaking the Dimensional Barrier in Non-Markovian Dynamic Portfolio Choice", venue: "Working paper", year: 2026, status: working }
      - { authors_short: "Huh, Jeong & Kim", title: "Scalable Dynamic Portfolio Allocation via Physics-Informed Neural Networks", venue: "Working paper", year: 2026, status: working }
      - { authors_short: "Huh, Ha & Jeong", title: "LSTM-based Dynamic Correlation Forecasting with Economic Conditions", venue: "Finance Research Letters", year: 2025, status: published, url: "https://www.sciencedirect.com/science/article/pii/S1544612325016794" }
      - { authors_short: "Huh, Kim, Jung & Jeong", title: "Dual-Uncertainty Modeling in Financial Time-Series via VMD-LSTM with Concrete Dropout and VMD-WGAN", venue: "Networks and Heterogeneous Media", year: 2025, status: published, url: "https://www.aimspress.com/article/doi/10.3934/nhm.2025061" }
      - { authors_short: "Huh, Jeon & Jeong", title: "Pontryagin-Guided Direct Policy Optimization for Continuous-Time Portfolio Problem", venue: "J. Industrial and Management Optimization", year: 2025, status: published, url: "https://www.aimsciences.org/article/doi/10.3934/jimo.2025110" }
      - { authors_short: "Jeong, Kim, Jung & Huh", title: "Accelerating SDE Simulation through Learning of Stochastic Dynamics", venue: "J. Korean Society for Industrial and Applied Mathematics", year: 2024, status: published, url: "https://www.kci.go.kr/kciportal/ci/sereArticleSearch/ciSereArtiView.kci?sereArticleSearchBean.artiId=ART003160878" }

  # --- Graduate students (by seniority) ---
  - group: grad
    slug: jung-min-lee
    name: Jung Min Lee
    name_kr: 이정민
    role: Integrated Ph.D. (Year 7)
    image: team/jung-min-lee.jpg
    detail: Utility maximization under shortfall tail risk
    bio: >-
      Jung Min Lee studies utility maximization under shortfall tail risk, formulating dynamic
      portfolio choice that combines CRRA utility with a Conditional Value-at-Risk (CVaR)
      constraint on downside losses.
    pubs:
      - { authors_short: "Huh & Lee", title: "Utility Maximization under Shortfall Tail Risk: A CRRA-CVaR Formulation", venue: "Working paper", year: 2026, status: working }
  - group: grad
    slug: minhyuk-kim
    name: Minhyuk Kim
    name_kr: 김민혁
    role: M.S. student (Year 4+)
    image: team/minhyuk-kim.jpg
    detail: "Thesis: Bankruptcy Anomaly Detection with Residual Deep Compressive Autoencoder"
    bio: >-
      Minhyuk Kim's thesis addresses bankruptcy anomaly detection using a residual deep
      compressive autoencoder, applying representation-learning and anomaly-scoring methods
      to corporate financial distress.
  - group: grad
    slug: minji-lee
    name: Minji Lee
    name_kr: 이민지
    role: M.S. student (Year 4)
    image: team/minji-lee.jpg
    detail: "Thesis: Forecasting the VIX Term Structure from the Implied Volatility Surface"
    bio: >-
      Minji Lee's thesis focuses on forecasting the VIX term structure from the implied
      volatility surface, modeling the link between option-implied volatility and forward
      volatility expectations.
  - group: grad
    slug: min-gang-jo
    name: Min-Gang Jo
    name_kr: 조민강
    role: M.S. student (Year 3)
    image: team/min-gang-jo.png
    detail: "Thesis: Flow Matching for Corporate Default Prediction"
    bio: >-
      Min-Gang Jo's thesis applies flow matching, a generative modeling technique, to
      corporate default prediction.
  - group: grad
    slug: dongwan-shin
    name: Dongwan Shin
    name_kr: 신동완
    role: M.S. student (Year 2) · Lab Manager · Server Administrator
    image: team/dongwan-shin.jpg
    detail: Machine learning for equity valuation, dynamic portfolio choice, decision-focused learning
    bio: >-
      Dongwan Shin works on machine learning for equity valuation, dynamic portfolio choice,
      and decision-focused learning. He also serves as Lab Manager and Server Administrator.
    pubs:
      - { authors_short: "Huh & Shin", title: "Breaking the Dimensional Barrier in Dynamic Portfolio Choice under High-Dimensional Jump Risk", venue: "Working paper", year: 2026, status: working }
      - { authors_short: "Huh, Shin, Cho & Koo", title: "Discounted Alpha: A Machine Learning Framework for Equity Valuation", venue: "Working paper", year: 2026, status: working }
  - group: grad
    slug: myeongsik-kim
    name: Myeongsik Kim
    name_kr: 김명식
    role: M.S. student (Year 2)
    image: team/myeongsik-kim.png
    detail: Deep operator learning for option pricing
    bio: >-
      Myeongsik Kim studies deep operator learning for option pricing, developing operator-network
      (DeepONet) surrogates for pricing options with functional coefficients.
    pubs:
      - { authors_short: "Huh, Kim & Choi", title: "Deep Operator Learning for Option Pricing with Functional Coefficients", venue: "Working paper", year: 2026, status: working }
  - group: grad
    slug: yoonyoung-byun
    name: Yoonyoung Byun
    name_kr: 변윤영
    role: M.S. student (Year 2)
    image: team/yoonyoung-byun.jpg
    detail: Pricing equity-linked securities using deep operator networks
    bio: >-
      Yoonyoung Byun works on pricing equity-linked securities (ELS) using deep operator networks,
      targeting real-time valuation of these structured products.
    pubs:
      - { authors_short: "Huh & Byun", title: "Real-Time Pricing of Equity-Linked Securities Using Deep Operator Networks", venue: "Working paper", year: 2026, status: working }
  - group: grad
    slug: seungho-na
    name: Seungho Na
    name_kr: 나승호
    role: M.S. student (Year 1)
    image: team/seungho-na.png
    detail: Deep hedging for nonsmooth payoffs under entropic risk
    bio: >-
      Seungho Na works on deep hedging for nonsmooth payoffs under entropic risk, developing
      Pontryagin-guided deep hedging methods, including a boundary-layer-stable variant for
      barrier options.
    pubs:
      - { authors_short: "Huh & Na", title: "Pontryagin-Guided Deep Hedging for Nonsmooth Payoffs under Entropic Risk", venue: "Working paper", year: 2026, status: working }
      - { authors_short: "Huh & Na", title: "Boundary-Layer Stable Pontryagin-Guided Deep Hedging for Barrier Options", venue: "Working paper", year: 2026, status: working }
