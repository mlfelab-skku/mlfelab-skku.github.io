  - group: grad
    slug: hojin-ko
    name: Hojin Ko
    name_kr: 고호진
    role: M.S. student (Year 0)
    image: team/hojin-ko.jpg
    detail: Non-exponential discounting frameworks · paper accepted to ICML 2026
    bio: >-
      Hojin Ko works on Pontryagin-guided frameworks beyond the standard Bellman recursion,
      including non-exponential discounting, optimal stopping, and portfolio choice with
      stochastic income. His paper on non-exponential discounting was accepted to ICML 2026.
    pubs:
      - { authors_short: "Ko & Huh", title: "Beyond the Bellman Recursion: A Pontryagin-Guided Framework for Non-Exponential Discounting", venue: "ICML 2026", year: 2026, status: published, url: "https://arxiv.org/abs/2605.20996" }
      - { authors_short: "Huh, Park & Ko", title: "Finite Horizon and Optimal Portfolio Choice with Stochastic Income", venue: "Working paper", year: 2026, status: working }
      - { authors_short: "Huh & Ko", title: "Breaking the Dimensional Barrier for Dynamic Portfolio Choice with Optimal Stopping", venue: "Working paper", year: 2026, status: working }
      - { authors_short: "Huh, Ko, Lee & Choi", title: "Macro-Based Forecasting of Implied Volatility Surface Dynamics", venue: "Working paper", year: 2026, status: working }
  - group: grad
    slug: ho-jun-lee
    name: Ho-Jun Lee
    name_kr: 이호준
    role: M.S. student (Year 0)
    image: team/ho-jun-lee.png
    detail: Macro-based forecasting of implied volatility surfaces
    bio: >-
      Ho-Jun Lee works on macro-based forecasting of implied volatility surfaces, modeling how
      macroeconomic conditions drive the dynamics of the implied volatility surface.
    pubs:
      - { authors_short: "Huh, Ko, Lee & Choi", title: "Macro-Based Forecasting of Implied Volatility Surface Dynamics", venue: "Working paper", year: 2026, status: working }

