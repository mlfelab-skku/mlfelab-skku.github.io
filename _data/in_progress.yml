future_directions: "Beyond its current scope, PG-DPO admits natural extensions to partial equilibrium settings — including robust optimization, rough volatility, regime, taxation, Epstein–Zin utility, smooth ambiguity and belief-state dynamics — as well as general equilibrium frameworks such as mean-field control and multi-agent games."
